{{- if eq .Values.networking.type "istio" }}
{{- if .Values.networking.istio.gateway.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ include "lens-selector-example.fullname" . }}
  labels:
    {{- include "lens-selector-example.labels" . | nindent 4 }}
spec:
  selector:
    {{- toYaml .Values.networking.istio.gateway.selector | nindent 4 }}
  servers:
    {{- range .Values.networking.istio.gateway.servers }}
    - port:
        number: {{ .port.number }}
        name: {{ .port.name }}
        protocol: {{ .port.protocol }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if .tls }}
      tls:
        {{- toYaml .tls | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
