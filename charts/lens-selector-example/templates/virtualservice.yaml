{{- if eq .Values.networking.type "istio" }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "lens-selector-example.fullname" . }}
  labels:
    {{- include "lens-selector-example.labels" . | nindent 4 }}
spec:
  hosts:
    {{- range .Values.networking.istio.hosts }}
    - {{ . | quote }}
    {{- end }}
  gateways:
    {{- range .Values.networking.istio.gateways }}
    - {{ . }}
    {{- end }}
  http:
    {{- range .Values.networking.istio.routes }}
    - match:
        {{- toYaml .match | nindent 8 }}
      route:
        - destination:
            host: {{ include "lens-selector-example.fullname" $ }}
            port:
              number: {{ $.Values.service.port }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
      {{- if .timeout }}
      timeout: {{ .timeout }}
      {{- end }}
      {{- if .retries }}
      retries:
        {{- toYaml .retries | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
